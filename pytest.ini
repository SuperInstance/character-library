[pytest]
# Pytest configuration for character-library tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts =
    -v
    --strict-markers
    --tb=short
    --cov=character_library
    --cov-report=term-missing
    --cov-report=html
    --cov-report=xml

# Coverage options
[coverage:run]
source = character_library
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*
    */examples/*
    setup.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov

[coverage:xml]
output = coverage.xml

# Markers for categorizing tests
markers =
    personality: Tests for personality frameworks (Big Five, Enneagram, MBTI)
    emotion: Tests for emotional modeling system
    relationships: Tests for relationship dynamics
    archetypes: Tests for character archetypes
    skills: Tests for skill development
    integration: Integration tests across multiple systems
    slow: Tests that take longer to run
    unit: Unit tests for individual components
